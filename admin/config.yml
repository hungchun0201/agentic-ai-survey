backend:
  name: github
  repo: hungchun0201/agentic-ai-survey
  branch: master
  auth_type: pkce
  app_id: Ov23liQ0yeq7dMfhIwI6

publish_mode: editorial_workflow
media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "papers"
    label: "Papers"
    label_singular: "Paper"
    folder: "content/papers"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    identifier_field: "slug"
    summary: "{{title}} — {{venue}}"
    sortable_fields: ["title", "venue", "section"]
    view_groups:
      - label: Section
        field: section
      - label: Agentic
        field: agentic
    view_filters:
      - label: "Agentic ✓"
        field: agentic
        pattern: "yes"
      - label: "Has Repo"
        field: has_repo
        pattern: true
      - label: "Best Paper"
        field: best_paper
        pattern: "best"
    fields:
      - { label: "Slug (URL path)", name: "slug", widget: "string", hint: "Lowercase hyphenated, e.g. 'my-paper'. Used as folder name under papers/" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Venue", name: "venue", widget: "string", hint: "e.g. OSDI'24, arXiv'25, MLSys'25" }
      - { label: "arXiv ID", name: "arxiv", widget: "string", required: false, hint: "e.g. 2511.02230" }
      - label: "Section"
        name: "section"
        widget: "select"
        options:
          - { label: "S1 — Workload Characterization", value: "s1" }
          - { label: "S2 — PD Disaggregation", value: "s2" }
          - { label: "S3 — KV Cache Management", value: "s3" }
          - { label: "S4 — KV Cache TTL & Retention", value: "s4" }
          - { label: "S5 — Scheduling & Routing", value: "s5" }
          - { label: "S6 — Learning-based Cache", value: "s6" }
          - { label: "S7 — Adjacent Areas", value: "s7" }
      - label: "Agentic-Aware"
        name: "agentic"
        widget: "select"
        options:
          - { label: "Yes — designed for agentic", value: "yes" }
          - { label: "Partial — some support", value: "partial" }
          - { label: "No", value: "no" }
      - { label: "PD Disaggregation", name: "pd_disagg", widget: "boolean", default: false }
      - { label: "Distributed", name: "distributed", widget: "boolean", default: false }
      - { label: "Has Open-Source Repo", name: "has_repo", widget: "boolean", default: false }
      - { label: "Repo URL", name: "repo_url", widget: "string", required: false, hint: "e.g. https://github.com/org/repo" }
      - label: "Best Paper"
        name: "best_paper"
        widget: "select"
        required: false
        options:
          - { label: "None", value: "" }
          - { label: "★ Best Paper", value: "best" }
          - { label: "★HM Honorable Mention", value: "hm" }
          - { label: "Best Paper Nominee", value: "nominee" }
      - { label: "Summary (Chinese)", name: "summary_zh", widget: "text" }
      - { label: "Summary (English)", name: "summary_en", widget: "text" }
      - { label: "Has Detail Page", name: "has_detail_page", widget: "boolean", default: false, hint: "Check after creating papers/SLUG/index.html" }

  - name: "sections"
    label: "Sections"
    files:
      - label: "Section Definitions"
        name: "sections"
        file: "data/sections.json"
        fields:
          - label: "Sections"
            name: "sections"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Title (Chinese)", name: "title_zh", widget: "string" }
              - { label: "Title (English)", name: "title_en", widget: "string" }
              - { label: "Intro (Chinese)", name: "intro_zh", widget: "text" }
              - { label: "Intro (English)", name: "intro_en", widget: "text" }
              - { label: "Color", name: "color", widget: "color" }
