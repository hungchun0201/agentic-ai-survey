<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" style="background:#0f1218;font-family:system-ui">

<!-- Title -->
<text x="450" y="28" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">slot_mapping.cuda() 造成 GPU 閒置 — Step Timeline</text>

<!-- ============================================================ -->
<!-- TOP: Current (with GC sync) -->
<!-- ============================================================ -->
<text x="20" y="58" fill="#ef4444" font-size="12" font-weight="700">Current（有 GC sync）：~115 ms / step</text>

<!-- Time axis -->
<line x1="55" y1="210" x2="830" y2="210" stroke="#334155" stroke-width="1"/>
<text x="55" y="225" fill="#64748b" font-size="8">0 ms</text>
<text x="265" y="225" fill="#64748b" font-size="8">30 ms</text>
<text x="735" y="225" fill="#64748b" font-size="8">100 ms</text>
<text x="820" y="225" fill="#64748b" font-size="8">115 ms</text>
<line x1="265" y1="70" x2="265" y2="210" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="735" y1="70" x2="735" y2="210" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,3"/>

<!-- CPU row label -->
<text x="15" y="88" fill="#94a3b8" font-size="10" font-weight="600">CPU</text>

<!-- CPU: launch forward (2ms) -->
<rect x="55" y="75" width="15" height="26" rx="3" fill="#8b5cf6"/>
<text x="62" y="92" fill="#fff" font-size="6" text-anchor="middle">fwd</text>

<!-- CPU: GC sync block -->
<rect x="72" y="75" width="663" height="26" rx="3" fill="#dc2626" opacity="0.8"/>
<text x="403" y="86" fill="#fff" font-size="10" text-anchor="middle" font-weight="700">CPU blocked: slot_mapping.cuda() → allocator GC → cudaStreamSync(default stream)</text>
<text x="403" y="98" fill="#fecaca" font-size="8" text-anchor="middle">CPU 等 GPU forward pass 跑完（100 ms），但這段時間 CPU 沒有把 offload 指令丟給 GPU</text>

<!-- CPU: launch offload + store sync -->
<rect x="737" y="75" width="50" height="26" rx="3" fill="#22c55e"/>
<text x="762" y="91" fill="#fff" font-size="7" text-anchor="middle">store()</text>
<rect x="789" y="75" width="35" height="26" rx="3" fill="#f97316"/>
<text x="806" y="91" fill="#fff" font-size="6" text-anchor="middle">sync</text>

<!-- GPU default stream label -->
<text x="15" y="130" fill="#94a3b8" font-size="10" font-weight="600">GPU</text>
<text x="15" y="140" fill="#64748b" font-size="8">default</text>

<!-- GPU: forward pass kernels (30ms) -->
<rect x="55" y="120" width="40" height="24" rx="2" fill="#8b5cf6"/>
<text x="75" y="135" fill="#fff" font-size="7" text-anchor="middle">FlashAttn</text>
<rect x="97" y="120" width="35" height="24" rx="2" fill="#6366f1"/>
<text x="114" y="135" fill="#fff" font-size="7" text-anchor="middle">GEMM</text>
<rect x="134" y="120" width="30" height="24" rx="2" fill="#a78bfa"/>
<text x="149" y="135" fill="#fff" font-size="6" text-anchor="middle">Triton</text>
<rect x="166" y="120" width="40" height="24" rx="2" fill="#8b5cf6"/>
<text x="186" y="135" fill="#fff" font-size="7" text-anchor="middle">FlashAttn</text>
<rect x="208" y="120" width="35" height="24" rx="2" fill="#6366f1"/>
<text x="225" y="135" fill="#fff" font-size="7" text-anchor="middle">GEMM</text>
<text x="253" y="135" fill="#64748b" font-size="8">···</text>

<!-- GPU: IDLE zone (70ms) — THE WASTE -->
<rect x="265" y="120" width="470" height="24" rx="2" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
<text x="500" y="130" fill="#ef4444" font-size="10" text-anchor="middle" font-weight="700">GPU 閒置 ~70 ms</text>
<text x="500" y="142" fill="#fca5a5" font-size="8" text-anchor="middle">forward 跑完了，但 CPU 還卡在 GC sync，沒人告訴 GPU 開始 offload</text>

<!-- GPU store stream label -->
<text x="15" y="172" fill="#94a3b8" font-size="10" font-weight="600">GPU</text>
<text x="15" y="182" fill="#64748b" font-size="8">store</text>

<!-- Store stream: idle then offload at the very end -->
<rect x="55" y="163" width="682" height="22" rx="2" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
<text x="396" y="177" fill="#475569" font-size="8" text-anchor="middle">store stream 閒置（CPU 沒有發 offload 指令）</text>
<rect x="737" y="163" width="87" height="22" rx="2" fill="#ef4444"/>
<text x="780" y="177" fill="#fff" font-size="7" text-anchor="middle">offload KV</text>

<!-- Annotation arrow -->
<path d="M 265 150 L 265 158 L 735 158 L 735 150" fill="none" stroke="#ef4444" stroke-width="1"/>
<text x="500" y="158" fill="#ef4444" font-size="7" text-anchor="middle">↑ 這段時間 GPU 完全沒事做 ↑</text>

<!-- ============================================================ -->
<!-- BOTTOM: Ideal (no GC sync) -->
<!-- ============================================================ -->
<text x="20" y="270" fill="#22c55e" font-size="12" font-weight="700">Ideal（無 GC sync）：~45 ms / step</text>

<!-- Time axis -->
<line x1="55" y1="420" x2="460" y2="420" stroke="#334155" stroke-width="1"/>
<text x="55" y="435" fill="#64748b" font-size="8">0 ms</text>
<text x="265" y="435" fill="#64748b" font-size="8">30 ms</text>
<text x="375" y="435" fill="#64748b" font-size="8">45 ms</text>
<line x1="265" y1="280" x2="265" y2="420" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,3"/>

<!-- CPU row -->
<text x="15" y="298" fill="#94a3b8" font-size="10" font-weight="600">CPU</text>

<!-- CPU: launch forward (2ms) -->
<rect x="55" y="285" width="15" height="26" rx="3" fill="#8b5cf6"/>
<text x="62" y="302" fill="#fff" font-size="6" text-anchor="middle">fwd</text>

<!-- CPU: launch offload immediately (no GC!) -->
<rect x="72" y="285" width="40" height="26" rx="3" fill="#22c55e"/>
<text x="92" y="301" fill="#fff" font-size="7" text-anchor="middle">store()</text>
<text x="72" y="280" fill="#22c55e" font-size="7">↑ 不分配 GPU 記憶體 → 不觸發 GC → 不阻塞</text>

<!-- CPU: wait for offload at the end -->
<rect x="114" y="285" width="261" height="26" rx="3" fill="#475569" opacity="0.4"/>
<text x="244" y="301" fill="#94a3b8" font-size="8" text-anchor="middle">CPU 等 store_stream.sync()（但 offload 已經在跑了）</text>

<!-- CPU: next step -->
<rect x="380" y="285" width="30" height="26" rx="3" fill="#3b82f6"/>
<text x="395" y="301" fill="#fff" font-size="7" text-anchor="middle">sched</text>
<text x="420" y="301" fill="#64748b" font-size="8">← next step</text>

<!-- GPU default stream -->
<text x="15" y="340" fill="#94a3b8" font-size="10" font-weight="600">GPU</text>
<text x="15" y="350" fill="#64748b" font-size="8">default</text>

<rect x="55" y="330" width="40" height="24" rx="2" fill="#8b5cf6"/>
<text x="75" y="345" fill="#fff" font-size="7" text-anchor="middle">FlashAttn</text>
<rect x="97" y="330" width="35" height="24" rx="2" fill="#6366f1"/>
<text x="114" y="345" fill="#fff" font-size="7" text-anchor="middle">GEMM</text>
<rect x="134" y="330" width="30" height="24" rx="2" fill="#a78bfa"/>
<text x="149" y="345" fill="#fff" font-size="6" text-anchor="middle">Triton</text>
<rect x="166" y="330" width="40" height="24" rx="2" fill="#8b5cf6"/>
<text x="186" y="345" fill="#fff" font-size="7" text-anchor="middle">FlashAttn</text>
<rect x="208" y="330" width="35" height="24" rx="2" fill="#6366f1"/>
<text x="225" y="345" fill="#fff" font-size="7" text-anchor="middle">GEMM</text>
<text x="253" y="345" fill="#64748b" font-size="8">···</text>

<!-- GPU store stream -->
<text x="15" y="382" fill="#94a3b8" font-size="10" font-weight="600">GPU</text>
<text x="15" y="392" fill="#64748b" font-size="8">store</text>

<!-- Store stream: wait event then immediately offload -->
<rect x="72" y="373" width="193" height="22" rx="2" fill="#475569" opacity="0.3"/>
<text x="168" y="387" fill="#94a3b8" font-size="7" text-anchor="middle">GPU 端 stream event 等 default stream</text>
<rect x="265" y="373" width="110" height="22" rx="2" fill="#22c55e"/>
<text x="320" y="387" fill="#fff" font-size="8" text-anchor="middle" font-weight="600">offload KV（零間隔）</text>

<!-- Arrow: seamless handoff -->
<line x1="265" y1="355" x2="265" y2="371" stroke="#22c55e" stroke-width="1.5"/>
<polygon points="261,371 269,371 265,377" fill="#22c55e"/>
<text x="270" y="367" fill="#22c55e" font-size="7">forward 完成 → offload 立刻開始</text>

<!-- ============================================================ -->
<!-- Summary box -->
<!-- ============================================================ -->
<rect x="20" y="455" width="860" height="110" rx="6" fill="rgba(239,68,68,0.06)" stroke="#ef4444" stroke-width="1"/>

<text x="40" y="478" fill="#e2e8f0" font-size="11" font-weight="700">差異不在「要不要等 forward 跑完」— 兩者都要等。差異在 GPU 閒置時間。</text>

<text x="40" y="500" fill="#ef4444" font-size="10">Current:  forward 跑完後 GPU 閒置 ~70 ms（CPU 卡在 GC sync，offload 指令還沒發出去）</text>
<text x="40" y="518" fill="#22c55e" font-size="10">Ideal:    forward 跑完後 GPU 閒置 0 ms（offload 指令已在 store stream 佇列，stream event 自動接手）</text>
<text x="40" y="540" fill="#f97316" font-size="10" font-weight="600">省下的 70 ms = step 從 115 ms 縮短到 45 ms = step rate 從 ~8/sec 升到 ~22/sec</text>
<text x="40" y="556" fill="#94a3b8" font-size="9">Root cause: slot_mapping.cuda() 在 hot loop 裡分配 GPU 記憶體 → allocator GC → sync default stream → CPU 被迫等 forward pass</text>

</svg>