<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" style="background:#0f1218;font-family:system-ui">

<!-- Title -->
<text x="450" y="25" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">Why slot_mapping.cuda() Costs 100 ms — Step Timeline Comparison</text>

<!-- ============================================================ -->
<!-- TOP: Current (with GC sync) — ~120 ms/step -->
<!-- ============================================================ -->
<text x="20" y="55" fill="#ef4444" font-size="12" font-weight="700">Current (with GC sync): ~120 ms/step → ~8 steps/sec</text>

<!-- CPU row -->
<text x="20" y="80" fill="#94a3b8" font-size="10" font-weight="600">CPU</text>
<rect x="60" y="68" width="30" height="24" rx="3" fill="#3b82f6"/>
<text x="75" y="84" fill="#fff" font-size="7" text-anchor="middle">sched</text>
<rect x="92" y="68" width="20" height="24" rx="3" fill="#8b5cf6"/>
<text x="102" y="84" fill="#fff" font-size="6" text-anchor="middle">fwd</text>

<!-- GC block — THE PROBLEM -->
<rect x="114" y="64" width="500" height="32" rx="3" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2"/>
<text x="120" y="78" fill="#ef4444" font-size="9" font-weight="700">wait_for_save()</text>

<rect x="130" y="100" width="12" height="16" rx="2" fill="#f97316"/>
<text x="136" y="112" fill="#fff" font-size="5" text-anchor="middle">.cuda()</text>
<rect x="144" y="100" width="400" height="16" rx="2" fill="#dc2626"/>
<text x="344" y="112" fill="#fff" font-size="8" text-anchor="middle">← CPU blocked: cudaStreamSynchronize (allocator GC) = 100 ms →</text>
<rect x="546" y="100" width="60" height="16" rx="2" fill="#22c55e"/>
<text x="576" y="112" fill="#fff" font-size="7" text-anchor="middle">store()</text>

<rect x="616" y="68" width="20" height="24" rx="3" fill="#6366f1"/>
<text x="626" y="84" fill="#fff" font-size="6" text-anchor="middle">samp</text>

<!-- GPU default stream row -->
<text x="20" y="148" fill="#94a3b8" font-size="10" font-weight="600">GPU</text>
<text x="20" y="158" fill="#64748b" font-size="8">(default)</text>

<rect x="92" y="140" width="60" height="20" rx="2" fill="#8b5cf6"/>
<text x="122" y="153" fill="#fff" font-size="7" text-anchor="middle">FlashAttn</text>
<rect x="154" y="140" width="50" height="20" rx="2" fill="#6366f1"/>
<text x="179" y="153" fill="#fff" font-size="7" text-anchor="middle">GEMM</text>
<rect x="206" y="140" width="60" height="20" rx="2" fill="#8b5cf6"/>
<text x="236" y="153" fill="#fff" font-size="7" text-anchor="middle">FlashAttn</text>
<rect x="268" y="140" width="50" height="20" rx="2" fill="#6366f1"/>
<text x="293" y="153" fill="#fff" font-size="7" text-anchor="middle">GEMM</text>
<rect x="320" y="140" width="40" height="20" rx="2" fill="#a78bfa"/>
<text x="340" y="153" fill="#fff" font-size="6" text-anchor="middle">Triton</text>
<rect x="362" y="140" width="60" height="20" rx="2" fill="#8b5cf6"/>
<text x="392" y="153" fill="#fff" font-size="7" text-anchor="middle">FlashAttn</text>
<rect x="424" y="140" width="50" height="20" rx="2" fill="#6366f1"/>
<text x="449" y="153" fill="#fff" font-size="7" text-anchor="middle">GEMM</text>
<text x="490" y="153" fill="#64748b" font-size="10">···</text>
<rect x="510" y="140" width="30" height="20" rx="2" fill="#8b5cf6"/>
<text x="525" y="153" fill="#fff" font-size="6" text-anchor="middle">L31</text>

<!-- Arrow: GC sync waits for this -->
<line x1="344" y1="116" x2="344" y2="138" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="348" y="134" fill="#ef4444" font-size="7">GC 在等這些 kernel 跑完</text>

<!-- GPU store stream row -->
<text x="20" y="180" fill="#94a3b8" font-size="10" font-weight="600">GPU</text>
<text x="20" y="190" fill="#64748b" font-size="8">(store)</text>

<!-- Store stream idle during GC, then works -->
<rect x="92" y="175" width="450" height="18" rx="2" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
<text x="317" y="187" fill="#475569" font-size="8" text-anchor="middle">store stream 完全閒置（等 CPU 發指令）</text>
<rect x="546" y="175" width="60" height="18" rx="2" fill="#ef4444"/>
<text x="576" y="187" fill="#fff" font-size="7" text-anchor="middle">offload</text>

<!-- Step boundary -->
<line x1="640" y1="55" x2="640" y2="200" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
<text x="645" y="75" fill="#475569" font-size="8">next step</text>

<!-- Total time marker -->
<line x1="60" y1="205" x2="636" y2="205" stroke="#ef4444" stroke-width="1"/>
<text x="348" y="218" fill="#ef4444" font-size="9" text-anchor="middle" font-weight="600">~120 ms / step</text>

<!-- ============================================================ -->
<!-- BOTTOM: Ideal (no GC sync) — ~20 ms/step -->
<!-- ============================================================ -->
<text x="20" y="260" fill="#22c55e" font-size="12" font-weight="700">Ideal (no GC sync): ~20 ms/step → ~50 steps/sec</text>

<!-- CPU row -->
<text x="20" y="285" fill="#94a3b8" font-size="10" font-weight="600">CPU</text>
<rect x="60" y="273" width="30" height="24" rx="3" fill="#3b82f6"/>
<text x="75" y="289" fill="#fff" font-size="7" text-anchor="middle">sched</text>
<rect x="92" y="273" width="20" height="24" rx="3" fill="#8b5cf6"/>
<text x="102" y="289" fill="#fff" font-size="6" text-anchor="middle">fwd</text>

<!-- wait_for_save — fast! -->
<rect x="114" y="273" width="60" height="24" rx="3" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="1"/>
<text x="144" y="289" fill="#22c55e" font-size="7" text-anchor="middle" font-weight="600">wfs 15ms</text>

<rect x="176" y="273" width="20" height="24" rx="3" fill="#6366f1"/>
<text x="186" y="289" fill="#fff" font-size="6" text-anchor="middle">samp</text>

<!-- Next step starts immediately! -->
<rect x="200" y="273" width="30" height="24" rx="3" fill="#3b82f6"/>
<text x="215" y="289" fill="#fff" font-size="7" text-anchor="middle">sched</text>
<rect x="232" y="273" width="20" height="24" rx="3" fill="#8b5cf6"/>
<text x="242" y="289" fill="#fff" font-size="6" text-anchor="middle">fwd</text>
<rect x="254" y="273" width="60" height="24" rx="3" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="1"/>
<text x="284" y="289" fill="#22c55e" font-size="7" text-anchor="middle" font-weight="600">wfs 15ms</text>
<text x="330" y="289" fill="#64748b" font-size="10">···</text>

<!-- GPU default stream row -->
<text x="20" y="323" fill="#94a3b8" font-size="10" font-weight="600">GPU</text>
<text x="20" y="333" fill="#64748b" font-size="8">(default)</text>

<rect x="92" y="315" width="60" height="20" rx="2" fill="#8b5cf6"/>
<text x="122" y="328" fill="#fff" font-size="7" text-anchor="middle">FlashAttn</text>
<rect x="154" y="315" width="50" height="20" rx="2" fill="#6366f1"/>
<text x="179" y="328" fill="#fff" font-size="7" text-anchor="middle">GEMM</text>
<rect x="206" y="315" width="40" height="20" rx="2" fill="#a78bfa"/>
<text x="226" y="328" fill="#fff" font-size="6" text-anchor="middle">Triton</text>
<text x="258" y="328" fill="#64748b" font-size="10">···</text>
<rect x="275" y="315" width="30" height="20" rx="2" fill="#8b5cf6"/>
<text x="290" y="328" fill="#fff" font-size="6" text-anchor="middle">L31</text>

<!-- GPU store stream — overlaps with forward! -->
<text x="20" y="355" fill="#94a3b8" font-size="10" font-weight="600">GPU</text>
<text x="20" y="365" fill="#64748b" font-size="8">(store)</text>

<rect x="114" y="350" width="15" height="18" rx="2" fill="#475569"/>
<text x="121" y="362" fill="#94a3b8" font-size="5" text-anchor="middle">wait</text>
<rect x="131" y="350" width="80" height="18" rx="2" fill="#ef4444"/>
<text x="171" y="362" fill="#fff" font-size="7" text-anchor="middle">offload (GPU→CPU)</text>

<!-- Arrow: store_stream waits for default stream via event (cheap) -->
<line x1="121" y1="336" x2="121" y2="348" stroke="#22c55e" stroke-width="1" stroke-dasharray="2,2"/>
<text x="125" y="345" fill="#22c55e" font-size="6">stream event (0 ms CPU cost)</text>

<!-- Step boundary -->
<line x1="200" y1="260" x2="200" y2="375" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

<!-- Total time marker -->
<line x1="60" y1="380" x2="196" y2="380" stroke="#22c55e" stroke-width="1"/>
<text x="128" y="393" fill="#22c55e" font-size="9" text-anchor="middle" font-weight="600">~20 ms / step</text>

<!-- ============================================================ -->
<!-- BOTTOM: Impact explanation -->
<!-- ============================================================ -->
<rect x="20" y="415" width="860" height="95" rx="6" fill="rgba(239,68,68,0.06)" stroke="#ef4444" stroke-width="1"/>
<text x="40" y="438" fill="#ef4444" font-size="11" font-weight="700">Impact: step rate 降低 6× → 所有 job 在 waiting queue 等更久</text>

<text x="40" y="460" fill="#e2e8f0" font-size="10">Current:  ~8 steps/sec → scheduler 每 120 ms 才能接新 request → queue 堆積 → 每 job +2.73 s</text>
<text x="40" y="478" fill="#22c55e" font-size="10">Ideal:    ~50 steps/sec → scheduler 每 20 ms 接新 request → queue 短 → overhead 可忽略</text>
<text x="40" y="498" fill="#94a3b8" font-size="9">Root cause: slot_mapping.cuda() (104 KB index array) 觸發 PyTorch allocator GC → sync default stream → 等 forward pass kernel</text>

</svg>